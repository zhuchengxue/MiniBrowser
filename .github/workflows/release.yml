name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore MiniBrowser.sln

      - name: Build
        run: dotnet build MiniBrowser.sln -c Release --no-restore

      - name: Self-test
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\Run-SelfTest.ps1

      - name: Package
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\Build-Installer.ps1

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MiniBrowser-packages
          path: |
            dist/MiniBrowser-Portable.zip
            dist/MiniBrowser-Setup.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MiniBrowser-Portable.zip
            dist/MiniBrowser-Setup.zip
